kind = "web"
previewPath = "/"
title = "Pre-Adjudication Integrity Protocol"
version = "1.0.0"
id = "artifacts/paip"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19824

[services.development]
run = "pnpm --filter @workspace/paip run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/paip", "run", "build" ]
publicDir = "artifacts/paip/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19824"
BASE_PATH = "/"
